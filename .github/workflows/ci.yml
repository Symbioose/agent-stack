name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # tmux backs every session; node-pty may compile from source.
      - run: sudo apt-get update && sudo apt-get install -y tmux
      - run: npm ci
      - run: npm run verify
